########################################################################################################################
# GLOBAL
########################################################################################################################

## @section Global parameters
global:

  ## @param global.annotations Define global annotations added to every pod
  annotations: {}

  cluster:

    cert:
      ## @param global.cluster.cert.annotations Set custom global cert annotations on the ingress
      annotations: {}

    ## @param global.cluster.domain Set global domain for the cluster
    domain: cluster.local

    ingress:
      ## @param global.cluster.ingress.ingressClassName Set global ingress class name
      ingressClassName: "nginx"

    pdb:
      ## @param global.cluster.pdb.enabled Enable PodDisruptionBudget
      enabled: false

  ## @param global.debug Enable global debugging
  debug: false

  image:
    ## @param global.image.pullPolicy Set global image pullPolicy
    pullPolicy: IfNotPresent
    ## @param global.image.pullSecrets Set global image pullSecrets
    pullSecrets: []
    ## @param global.image.registry Set global image container registry
    registry: docker.edu-sharing.com
    ## @param global.image.repository Set global image container repository (path under the registry)
    repository: projects/wlo/ideendatenbank

  metrics:
    servicemonitor:
      ## @param global.metrics.servicemonitor.enabled Enable a Prometheus ServiceMonitor
      enabled: false

  ## @param global.security Set global custom pod security context parameters (merged into podSecurityContext)
  security: {}

########################################################################################################################
# LOCAL
########################################################################################################################

## @section Local parameters
## @param nameOverride Override the chart name used for resource names
nameOverride: ""
## @param fullnameOverride Fully override the generated resource name
fullnameOverride: ""

image:
  ## @param image.name Override image repository (defaults to global.image.registry/global.image.repository)
  name: ""
  ## @param image.tag Set image tag (defaults to .Chart.AppVersion)
  tag: ""

########################################################################################################################

## @param replicaCount Amount of replicas. MUST stay 1 — the app uses a single-writer SQLite database on one PVC.
replicaCount: 1

########################################################################################################################

service:
  ## @param service.type Set service type
  type: ClusterIP
  ## @param service.port Set service port (cluster-internal)
  port: 8000

########################################################################################################################

ingress:

  ## @param ingress.enabled Enable ingress
  enabled: true

  annotations:
    ## @param ingress.annotations.nginx.ingress.kubernetes.io/proxy-body-size Max request body size (must cover upload limits)
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
    ## @param ingress.annotations.nginx.ingress.kubernetes.io/proxy-read-timeout Set proxy-read-timeout on nginx ingress
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    ## @param ingress.annotations.nginx.ingress.kubernetes.io/proxy-send-timeout Set proxy-send-timeout on nginx ingress
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"

  ## @param ingress.hosts Set ingress hosts
  hosts:
  - ideen.127.0.0.1.nip.io

  ## @param ingress.paths Set paths served from the host
  paths:
  - /

  ## @param ingress.tls Set TLS for ingress
  #  - secretName: ideendatenbank-tls
  #    hosts:
  #    - ideen.example.de
  tls: []

########################################################################################################################

## @section Application configuration
config:

  edu:
    ## @param config.edu.repoBaseUrl Repository base URL (drives API + "open in repo"/register links)
    repoBaseUrl: https://redaktion.openeduhub.net
    ## @param config.edu.repoApi Explicit API base. Empty → derived from repoBaseUrl (<base>/edu-sharing/rest)
    repoApi: ""
    ## @param config.edu.guestInboxId Inbox collection id for anonymous submissions
    guestInboxId: "21144164-30c0-4c01-ae16-264452197063"
    ## @param config.edu.rootCollectionId Root collection id of the idea database
    rootCollectionId: "4197d4d2-c700-400c-97d4-d2c700900c68"
    ## @param config.edu.guestUser edu-sharing guest service-account username (REQUIRED). Stored in the chart secret.
    guestUser: ""
    ## @param config.edu.guestPass edu-sharing guest service-account password (REQUIRED). Stored in the chart secret.
    guestPass: ""

  app:
    ## @param config.app.corsOrigins Comma-separated list of allowed browser origins
    corsOrigins: "https://ideen.example.de"
    ## @param config.app.syncIntervalSeconds Repository sync interval in seconds
    syncIntervalSeconds: 300

  backup:
    ## @param config.backup.enabled Enable periodic ZIP backups of the SQLite DB
    enabled: true
    ## @param config.backup.intervalHours Backup interval in hours
    intervalHours: 24
    ## @param config.backup.keep Number of backups to retain
    keep: 3
    ## @param config.backup.autoRestoreMarker Marker filename that opts in to auto-restore on first start
    autoRestoreMarker: "AUTO_RESTORE_OK"

  upload:
    ## @param config.upload.imageMaxBytes Max bytes for preview images (10 MB)
    imageMaxBytes: "10485760"
    ## @param config.upload.contentMaxBytes Max bytes for idea main content (50 MB)
    contentMaxBytes: "52428800"
    ## @param config.upload.attachmentMaxBytes Max bytes per attachment (50 MB)
    attachmentMaxBytes: "52428800"
    ## @param config.upload.restoreMaxBytes Max bytes for a backup-restore upload (200 MB)
    restoreMaxBytes: "209715200"

  moderation:
    ## @param config.moderation.fallbackGroups Comma-separated edu-sharing groups granted moderation rights
    fallbackGroups: "GROUP_ALFRESCO_ADMINISTRATORS"
    ## @param config.moderation.bootstrapUsers Comma-separated usernames bootstrapped as moderators
    bootstrapUsers: ""

  llm:
    ## @param config.llm.enabled Enable optional LLM integration
    enabled: false
    ## @param config.llm.baseUrl LLM API base URL
    baseUrl: ""
    ## @param config.llm.model LLM model id
    model: ""
    ## @param config.llm.apiKey LLM API key (stored in the chart secret)
    apiKey: ""

  ## @param config.extraEnv Extra plain environment variables (map) injected into the container
  extraEnv: {}

########################################################################################################################

## @param debug Enable debugging for this release (overrides global.debug)
debug: false

########################################################################################################################

persistence:
  ## @param persistence.enabled Enable persistent storage for /data (SQLite + backups)
  enabled: true
  ## @param persistence.mountPath Mount path for the data volume
  mountPath: /data
  ## @param persistence.storageClassName StorageClass for the data PVC (empty → cluster default)
  storageClassName: ""
  ## @param persistence.accessModes Access modes for the data PVC
  accessModes: [ "ReadWriteOnce" ]
  ## @param persistence.size Storage request for the data PVC
  size: 2Gi

########################################################################################################################

## @param nodeAffinity Set node affinity
nodeAffinity: {}

## @param tolerations Set tolerations
tolerations: []

## @param podAnnotations Set custom pod annotations
podAnnotations: {}

podSecurityContext:
  ## @param podSecurityContext.fsGroup Set fs group for volume access (matches the image's app user)
  fsGroup: 999
  ## @param podSecurityContext.fsGroupChangePolicy Set change policy for fs group
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  ## @param securityContext.allowPrivilegeEscalation Allow privilege escalation
  allowPrivilegeEscalation: false
  ## @param securityContext.readOnlyRootFilesystem Mount the root filesystem read-only
  readOnlyRootFilesystem: false
  capabilities:
    ## @param securityContext.capabilities.drop Set drop capabilities
    drop:
    - ALL
  ## @param securityContext.runAsNonRoot Require running as non-root
  runAsNonRoot: true
  ## @param securityContext.runAsUser User id to run as (image's "app" user)
  runAsUser: 999

########################################################################################################################

## @param terminationGracePeriod Grace period for termination in seconds
terminationGracePeriod: 60

startupProbe:
  ## @param startupProbe.failureThreshold Failure threshold for startupProbe
  failureThreshold: 30
  ## @param startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
  initialDelaySeconds: 5
  ## @param startupProbe.periodSeconds Period seconds for startupProbe
  periodSeconds: 5
  ## @param startupProbe.successThreshold Success threshold for startupProbe
  successThreshold: 1
  ## @param startupProbe.timeoutSeconds Timeout seconds for startupProbe
  timeoutSeconds: 5

livenessProbe:
  ## @param livenessProbe.failureThreshold Failure threshold for livenessProbe
  failureThreshold: 3
  ## @param livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
  initialDelaySeconds: 0
  ## @param livenessProbe.periodSeconds Period seconds for livenessProbe
  periodSeconds: 30
  ## @param livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
  timeoutSeconds: 5

readinessProbe:
  ## @param readinessProbe.failureThreshold Failure threshold for readinessProbe
  failureThreshold: 3
  ## @param readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
  initialDelaySeconds: 0
  ## @param readinessProbe.periodSeconds Period seconds for readinessProbe
  periodSeconds: 10
  ## @param readinessProbe.successThreshold Set threshold for success on readiness probe
  successThreshold: 1
  ## @param readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
  timeoutSeconds: 5

########################################################################################################################

resources:

  limits:
    ## @param resources.limits.cpu Set CPU limit on resources
    cpu: 1000m
    ## @param resources.limits.memory Set memory limit on resources
    memory: 1Gi
  requests:
    ## @param resources.requests.cpu Set CPU for requests on resources
    cpu: 250m
    ## @param resources.requests.memory Set memory for requests on resources
    memory: 512Mi

########################################################################################################################
