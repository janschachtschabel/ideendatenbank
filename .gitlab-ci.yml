# =============================================================================
# GitLab CI/CD — HackathOERn Ideendatenbank (produktives Deployment)
# =============================================================================
# Aktive Pipeline-Konfiguration für das firmeninterne GitLab-Repo (Standard-
# Pfad im Repo-Root). Berührt die GitHub-Workflows (.github/workflows/) nicht
# — beide Plattformen laufen parallel (GitHub → ghcr.io, GitLab → self-hosted).
#
# CREDENTIALS / FIRMEN-SPEZIFISCHES — NICHT hier eintragen, sondern in GitLab
# unter  Settings → CI/CD → Variables  als (masked + protected) Variablen
# anlegen:
#   DOCKER_REGISTRY   z.B. docker.edu-sharing.com   (Registry-Host)
#   DOCKER_USERNAME   CI-Benutzer / Deploy-Token-User
#   DOCKER_PASSWORD   CI-Token / Passwort           (masked + protected)
#   DIND_IMAGE        z.B. docker:27-dind
#   DIND_HOST         z.B. tcp://docker:2376
#   DIND_DRIVER       z.B. overlay2
#   DIND_TLS_CERTDIR  z.B. /certs
#
# Image-Pfad: DOCKER_IMAGE_PATH unten — Default leitet sich automatisch aus
# dem Projektpfad ab. Bei Bedarf als CI/CD-Variable überschreiben.
#
# Der Docker-Build (Stage „build") läuft nur, wenn DOCKER_REGISTRY gesetzt ist
# — solange die Variablen fehlen, bleibt die Pipeline grün (nur Lint läuft).
# =============================================================================

stages:
  - lint
  - test
  - build
  - deploy

variables:
  # Image-Pfad in der Registry (ohne Registry-Host). Voller Pull-Pfad ergibt
  # sich als "$DOCKER_REGISTRY/$DOCKER_IMAGE_PATH" →
  #   docker.edu-sharing.com/projects/wlo/ideendatenbank
  # Fester Pfad statt $CI_PROJECT_PATH, damit die GitLab-Gruppenhierarchie
  # (z.B. "edu-sharing/projects/...") nicht ins Image-Repo durchschlägt.
  # Bei Bedarf als CI/CD-Variable überschreiben.
  DOCKER_IMAGE_PATH: "projects/wlo/ideendatenbank"

  # --- Folgende Variablen NICHT hier setzen, sondern als CI/CD-Variablen ---
  # DOCKER_REGISTRY   z.B. registry.example.com         (Registry-Host)
  # DOCKER_USERNAME   CI-Benutzer / Deploy-Token-User
  # DOCKER_PASSWORD   CI-Token / Passwort  (masked + protected)
  # DIND_IMAGE        z.B. docker:27-dind
  # DIND_HOST         z.B. tcp://docker:2376
  # DIND_DRIVER       z.B. overlay2
  # DIND_TLS_CERTDIR  z.B. /certs
  #
  # --- Helm-Chart-Push (Stage „deploy") ---
  # HELM_REGISTRY     Upload-URL des Chart-Repos (z.B. https://charts.example.com/...)
  # HELM_USERNAME     Chart-Repo-Benutzer / Deploy-Token-User
  # HELM_PASSWORD     Chart-Repo-Token / Passwort  (masked + protected)

# -----------------------------------------------------------------------------
# Backend-Lint (ruff) — Konfiguration liegt in backend/pyproject.toml
# -----------------------------------------------------------------------------
ruff check:
  stage: lint
  interruptible: true
  image:
    name: ghcr.io/astral-sh/ruff:0.9.5-alpine
  before_script:
    - cd "$CI_PROJECT_DIR/backend"
    - ruff --version
  script:
    - ruff check --output-format=gitlab app/ > "$CI_PROJECT_DIR/code-quality-report.json"
  artifacts:
    reports:
      codequality: code-quality-report.json

ruff format:
  stage: lint
  interruptible: true
  image:
    name: ghcr.io/astral-sh/ruff:0.9.5-alpine
  before_script:
    - cd "$CI_PROJECT_DIR/backend"
    - ruff --version
  script:
    # Prüft, ob der Code ruff-format-konform ist (Diff = Exit-Code ≠0).
    # Der Code wurde einmalig mit `ruff format` durchformatiert; neue
    # Beiträge müssen das ebenfalls sein. Lokal vor dem Commit:
    #   cd backend && ruff format app/
    - ruff format --diff app/

# -----------------------------------------------------------------------------
# Backend-Tests (pytest) — die eigentliche Regressions-Absicherung. Läuft VOR
# dem Docker-Build (eigene Stage), damit ein Test-Fehler den Build stoppt.
# -----------------------------------------------------------------------------
pytest:
  stage: test
  interruptible: true
  image: python:3.12-slim-bookworm
  before_script:
    - cd "$CI_PROJECT_DIR/backend"
    - python -m pip install --upgrade pip
    - pip install -e .
    - pip install slowapi pytest pip-audit
  script:
    - python -m pytest tests
    # Dependency-Audit gegen die PyPI-Advisory-DB (Gate zusätzlich zu den
    # manuell gepflegten CVE-Floors in pyproject.toml).
    - python -m pip_audit

# -----------------------------------------------------------------------------
# Frontend-Lint (Angular ESLint) — optional, aber empfohlen.
# Hinweis: Das Frontend wird ohnehin im Docker-Build (Stage 1) gebaut; dieser
# Job prüft nur die Lint-Regeln separat. Bei Bedarf entfernen.
# -----------------------------------------------------------------------------
frontend lint:
  stage: lint
  interruptible: true
  image: node:22-bookworm-slim
  before_script:
    - cd "$CI_PROJECT_DIR/frontend"
    # Lockfile-bindend (s. Dockerfile-Kommentar; verifiziert 2026-07-03).
    - npm ci --no-audit --no-fund
  script:
    - npx ng lint
  allow_failure: true  # Lint-Warnungen sollen den Pipeline-Lauf nicht blocken

# Frontend-Unit-Tests (Karma/Jasmine, headless). Audit-Nachtrag: die Specs
# (u.a. Interceptor-Sicherheit — Credentials gehen NIE an Fremd-Origins)
# existierten, liefen aber in keiner Pipeline. Chromium aus dem Debian-Repo;
# der Container läuft als root → ChromeHeadlessNoSandbox (karma.conf.js).
frontend test:
  stage: test
  interruptible: true
  image: node:22-bookworm-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends chromium
    - export CHROME_BIN=/usr/bin/chromium
    - cd "$CI_PROJECT_DIR/frontend"
    - npm ci --no-audit --no-fund
  script:
    - npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox

# Blockierendes Dependency-Audit der Prod-Abhängigkeiten (eigener Job, weil
# `frontend lint` bewusst allow_failure hat — das Audit soll hart gaten).
npm audit:
  stage: lint
  interruptible: true
  image: node:22-bookworm-slim
  before_script:
    - cd "$CI_PROJECT_DIR/frontend"
    - npm ci --no-audit --no-fund
  script:
    - npm audit --omit=dev --audit-level=high

# -----------------------------------------------------------------------------
# Docker-Image bauen + in (self-hosted) Registry pushen — main + develop
# Tag = Branch-Slug (z.B. "main", "develop")
# -----------------------------------------------------------------------------
build and push (branches):
  stage: build
  image: $DIND_IMAGE
  variables:
    DOCKER_HOST: "$DIND_HOST"
    DOCKER_DRIVER: "$DIND_DRIVER"
    DOCKER_TLS_CERTDIR: "$DIND_TLS_CERTDIR"
  services:
    - name: "$DIND_IMAGE"
      alias: docker
      entrypoint: [ "env", "-u", "DOCKER_HOST" ]
      command: [ "dockerd-entrypoint.sh" ]
  before_script:
    - docker --version
  script:
    - docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
    - docker buildx build --tag "$DOCKER_REGISTRY/$DOCKER_IMAGE_PATH:$CI_COMMIT_REF_SLUG" .
    - docker image push "$DOCKER_REGISTRY/$DOCKER_IMAGE_PATH:$CI_COMMIT_REF_SLUG"
  rules:
    # Läuft nur, wenn die Registry-Variable gesetzt ist. Solange die
    # CI/CD-Variablen (DOCKER_REGISTRY etc.) fehlen, wird der Job
    # übersprungen — die Pipeline bleibt grün (statt am Login zu scheitern).
    - if: "$CI_COMMIT_BRANCH == 'main' && $DOCKER_REGISTRY"
    - if: "$CI_COMMIT_BRANCH == 'develop' && $DOCKER_REGISTRY"

# -----------------------------------------------------------------------------
# Docker-Image bauen + pushen bei Tag-Erstellung (z.B. v1.2.0)
# Tag = exakter Git-Tag-Name
# -----------------------------------------------------------------------------
build and push (tags):
  stage: build
  image: $DIND_IMAGE
  variables:
    DOCKER_HOST: "$DIND_HOST"
    DOCKER_DRIVER: "$DIND_DRIVER"
    DOCKER_TLS_CERTDIR: "$DIND_TLS_CERTDIR"
  services:
    - name: "$DIND_IMAGE"
      alias: docker
      entrypoint: [ "env", "-u", "DOCKER_HOST" ]
      command: [ "dockerd-entrypoint.sh" ]
  before_script:
    - docker --version
  script:
    - docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
    - docker buildx build --tag "$DOCKER_REGISTRY/$DOCKER_IMAGE_PATH:$CI_COMMIT_REF_NAME" .
    - docker image push "$DOCKER_REGISTRY/$DOCKER_IMAGE_PATH:$CI_COMMIT_REF_NAME"
  rules:
    # Nur bei Tag UND konfigurierter Registry (siehe oben).
    - if: "$CI_COMMIT_TAG && $DOCKER_REGISTRY"

# -----------------------------------------------------------------------------
# Helm-Chart paketieren + ins Chart-Repo pushen
# Chart-/App-Version = Git-Tag (bei Tag) bzw. 0.0.0-<branch-slug> (bei Branch)
# -----------------------------------------------------------------------------
.helm_base:
  stage: deploy
  image:
    name: alpine/helm:latest
    entrypoint: [""]
  before_script:
    - helm version
  script:
    - helm package deploy/helm/ideendatenbank
        --version "$CHART_VERSION"
        --app-version "$APP_VERSION"
    - >
      curl --fail --silent --show-error
      -u "$HELM_USERNAME:$HELM_PASSWORD"
      --upload-file edu_sharing-projects-wlo-ideendatenbank-${CHART_VERSION}.tgz
      $HELM_REGISTRY

build and push helm chart:
  extends: .helm_base
  variables:
    CHART_VERSION: "0.0.0-$CI_COMMIT_REF_SLUG"
    APP_VERSION: "$CI_COMMIT_REF_SLUG"
  rules:
    # Tag → Chart-/App-Version = exakter Tag-Name. Nur mit konfiguriertem
    # Chart-Repo (HELM_REGISTRY) — sonst übersprungen, Pipeline bleibt grün.
    - if: "$CI_COMMIT_TAG && $HELM_REGISTRY"
      variables:
        CHART_VERSION: "$CI_COMMIT_REF_NAME"
        APP_VERSION: "$CI_COMMIT_REF_NAME"
    - if: "$CI_COMMIT_BRANCH && $HELM_REGISTRY"
