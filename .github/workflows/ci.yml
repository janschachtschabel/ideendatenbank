name: CI — Lint & Smoke

# Schnelle Sanity-Checks vor dem Docker-Build:
# - Backend importiert sauber + Routes-Schema valide
# - Frontend baut durch (TypeScript-Check)
# Läuft bei jedem Push + PR auf main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Node 24 als Action-Runtime — Node 20 wird in GitHub-Runnern
  # ab Q3 2026 entfernt.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    name: Backend — Import + OpenAPI-Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install slowapi ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/

      - name: Import smoke
        working-directory: backend
        run: |
          python -c "import app.main; print('OK: app.main imports')"
          python -c "import app.routes; import app.backup; import app.sync; print('OK: alle Module importieren')"

      - name: OpenAPI-Schema generieren
        working-directory: backend
        run: |
          python - <<'PY'
          from app.main import app
          import json
          schema = app.openapi()
          assert "/api/v1/topics" in schema["paths"], "topics-endpoint fehlt"
          assert "/api/v1/admin/backup" in schema["paths"], "backup-endpoint fehlt"
          assert "/api/v1/admin/stats" in schema["paths"], "stats-endpoint fehlt"
          print(f"OK: {len(schema['paths'])} Endpoints im Schema")
          PY

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — Angular 19 + @angular-eslint 21 + typescript-eslint 8
          # erwarten >=20.19; 22.x ist die nächste „rounded" LTS-Variante.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint (ng lint)
        working-directory: frontend
        # Warnings sind ok (Accessibility/any-Hinweise), Errors brechen
        # den Build ab.
        run: npx ng lint --max-warnings=999

      - name: Build embed bundle
        working-directory: frontend
        run: npm run build:embed

      - name: Verify dist
        working-directory: frontend
        run: |
          test -f dist/embed/browser/index.html || (echo "dist/index.html fehlt" && exit 1)
          test -f dist/embed/browser/main.js || (echo "dist/main.js fehlt" && exit 1)
          echo "OK: Bundle gebaut"
          ls -la dist/embed/browser/ | head -10
